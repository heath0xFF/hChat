name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev

      - name: Build
        run: cargo build --release

      - name: Package binary
        run: |
          cd target/release
          tar czf ../../hchat-linux-x86_64.tar.gz hchat
          cd ../..

      - name: Build .deb
        run: |
          cargo install cargo-deb
          cargo deb --no-build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            hchat-linux-x86_64.tar.gz
            target/debian/*.deb

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Create .app bundle
        run: |
          cargo install cargo-bundle
          cargo bundle --release

      - name: Package binary
        run: |
          cd target/release
          tar czf ../../hchat-macos-arm64.tar.gz hchat
          cd ../..

      - name: Package .app
        run: |
          cd target/release/bundle/osx
          zip -r ../../../../hChat.app.zip hChat.app
          cd ../../../..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            hchat-macos-arm64.tar.gz
            hChat.app.zip

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/hchat-linux-x86_64.tar.gz
            artifacts/*.deb
            artifacts/hchat-macos-arm64.tar.gz
            artifacts/hChat.app.zip
